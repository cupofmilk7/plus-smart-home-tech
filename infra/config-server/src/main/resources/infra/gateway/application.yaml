spring:
  cloud:
    gateway:
      routes:
        - id: shopping_store_route
          uri: lb://SHOPPING-STORE
          predicates:
            - Path=/shopping-store/**
          filters:
            - PrefixPath=/api/v1

        - id: shopping_cart_route
          uri: lb://SHOPPING-CART
          predicates:
            - Path=/shopping-cart/**
          filters:
            - PrefixPath=/api/v1

        - id: warehouse_route
          uri: lb://WAREHOUSE
          predicates:
            - Path=/warehouse/**
          filters:
            - PrefixPath=/api/v1

        - id: order_route
          uri: lb://ORDER
          predicates:
            - Path=/order/**
          filters:
            - PrefixPath=/api/v1

        - id: payment_route
          uri: lb://PAYMENT
          predicates:
            - Path=/payment/**
          filters:
            - PrefixPath=/api/v1

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG