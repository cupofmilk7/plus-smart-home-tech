spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/warehouse
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 0

logging:
  level:
    ru.yandex.practicum: DEBUG

eureka:
  client:
    enabled: false