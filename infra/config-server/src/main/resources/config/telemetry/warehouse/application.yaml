spring:
  application:
    name: warehouse
  datasource:
    url: jdbc:postgresql://localhost:5435/warehouse
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    ru.yandex.practicum: DEBUG