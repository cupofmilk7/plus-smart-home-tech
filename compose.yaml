version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: confluentinc/confluent-local:7.4.3
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CLUSTER_ID: 'K0EA9p0yEe6MkAAAAkKsEg'

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.3
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  kafka-init-topics:
    image: confluentinc/confluent-local:7.4.3
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: "bash -c \
                'cub kafka-ready -b kafka:29092 1 30 && \
                kafka-topics --create --topic telemetry.sensors.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic telemetry.hubs.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092'"

  postgres-shopping-store:
    image: postgres:16
    container_name: postgres-shopping-store
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shopping_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_shopping_store_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopping_store"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shopping-cart:
    image: postgres:16
    container_name: postgres-shopping-cart
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: shopping_cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_shopping_cart_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopping_cart"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16
    container_name: postgres-warehouse
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16
    container_name: postgres-order
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - commerce-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d payment" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-delivery:
    image: postgres:16
    container_name: postgres-delivery
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_delivery_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - commerce-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d delivery" ]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  commerce-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_shopping_store_data:
  postgres_shopping_cart_data:
  postgres_warehouse_data:
  postgres_order_data:
  postgres_payment_data:
  postgres_delivery_data: